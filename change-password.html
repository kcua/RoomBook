<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - RoomBook</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="app-shell">
    <header class="topbar">
        <div class="brand">
            <h1>Change Password</h1>
            <p>Update your RoomBook account password.</p>
        </div>
        <div class="user-actions">
            <p id="userStatus" class="muted"></p>
            <button class="secondary" onclick="window.location.href='index.html'">Back to Bookings</button>
            <button class="secondary" onclick="logout()">Logout</button>
        </div>
    </header>

    <section class="panel account-panel">
        <div class="panel-header">
            <div>
                <h2>Password Details</h2>
                <p class="muted">Use a strong password to keep your account secure.</p>
            </div>
        </div>

        <div class="form-grid account-form">
            <div>
                <label for="currentPassword">Current Password</label>
                <input id="currentPassword" type="password">
            </div>

            <div>
                <label for="newPassword">New Password</label>
                <input id="newPassword" type="password">
            </div>

            <div class="button-row">
                <button onclick="changePassword()">Change Password</button>
                <button class="secondary" onclick="window.location.href='index.html'">Cancel</button>
            </div>

            <p id="passwordResult" class="status-message"></p>
        </div>
    </section>
</main>

<script src="change-password.js"></script>
</body>
</html>
